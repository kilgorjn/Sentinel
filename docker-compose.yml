services:

  mysql:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: sentinel
      MYSQL_USER: sentinel
      MYSQL_PASSWORD: sentinel
    volumes:
      - mysql-data:/var/lib/mysql
    ports:
      - "3306:3306"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  monitor:
    build: .
    command: python -m core.monitor
    volumes:
      - sentinel-data:/data
    environment:
      - DATABASE_URL=mysql+pymysql://sentinel:sentinel@mysql:3306/sentinel
      - SENTINEL_LOG_PATH=/data/financial_news.log
      - NEWSAPI_KEY=${NEWSAPI_KEY}
    depends_on:
      mysql:
        condition: service_healthy
    restart: unless-stopped

  api:
    build: .
    command: uvicorn api.main:app --host 0.0.0.0 --port 8000 --workers 1
    ports:
      - "8000:8000"
    volumes:
      - sentinel-data:/data
    environment:
      - DATABASE_URL=mysql+pymysql://sentinel:sentinel@mysql:3306/sentinel
      - SENTINEL_LOG_PATH=/data/financial_news.log
    depends_on:
      mysql:
        condition: service_healthy
    restart: unless-stopped

volumes:
  mysql-data:
  sentinel-data:
